name: Bug report
description: Report a validator, template, or contract bug.
title: "Bug: "
labels:
  - bug
body:
  - type: input
    id: affected_file
    attributes:
      label: Affected file
      description: Which file or template is involved?
      placeholder: scripts/validate.mjs
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: node --version
    validations:
      required: true
  - type: input
    id: reproduction
    attributes:
      label: Reproduction command
      placeholder: npm run validate
    validations:
      required: true
